# rag — Local-first multi-corpus RAG knowledge base configuration
#
# This file is optional; if absent, the defaults below are used.
# Environment variables (RAG_DB_HOST, RAG_OLLAMA_ENDPOINT, etc.) override
# anything here. Run `rag config show` to see the effective merged view.

database:
    host: 127.0.0.1
    port: 5432
    name: rag
    user: postgres
    # Leave password empty to use the postgres default (no-password local).
    # Set RAG_DB_PASSWORD env var for secure overrides.
    password: ""

embedding:
    endpoint: http://localhost:11434
    model: nomic-embed-text:v1.5
    dimension: 768
    timeout_seconds: 30
    max_retries: 3
    # Number of chunks sent per Ollama /api/embed request. Larger batches
    # are faster (fewer roundtrips) but use more memory and give coarser
    # progress updates. 32 is a good default for nomic-embed-text.
    batch_size: 32

defaults:
    # Chunk size + overlap are token counts (estimated as chars / 4).
    chunk_size: 512
    chunk_overlap: 128
    search_limit: 10
    threshold: 0.45
    # Reciprocal Rank Fusion tuning for hybrid search. k smooths out the
    # rank contributions; keyword_boost >1 favors exact-term matches.
    rrf_k: 60
    keyword_boost: 1.5

parsers:
    # If docling is installed, enable rich-format parsing for pdf/docx/pptx/html/images.
    docling_enabled: true
    # OCR for scanned PDFs / images. Uses the models in docling_artifacts_path.
    # Pre-fetch once with: distrobox enter dev -- docling-tools models download rapidocr
    # (happens automatically during `just bootstrap`).
    docling_ocr: true
    # User-writable cache for docling layout/OCR model weights. Populated by
    # `docling-tools models download` — pointing docling here keeps RapidOCR
    # from trying to write into root-owned site-packages.
    docling_artifacts_path: ~/.cache/docling/models
    # Skip dotfiles and dotdirs by default (set to false to include .config/ etc.)
    skip_hidden: true
    # Probe the first KB of files for NUL bytes to detect binaries.
    skip_binary: true
    # Hard cap on per-file size (MB). Larger files are skipped with a warning.
    max_file_size_mb: 25

mcp:
    enabled: true
    default_limit: 8
    default_threshold: 0.4
