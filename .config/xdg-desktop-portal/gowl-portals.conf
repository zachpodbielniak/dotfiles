# xdg-desktop-portal routing for gowl-based sessions.
#
# Read by xdg-desktop-portal for any session whose XDG_CURRENT_DESKTOP
# contains "gowl" (cmacs --gowl reports "CMacs:gowl"; standalone gowl
# reports "gowl:wlroots").  Desktop-specific files are read before the
# generic portals.conf, and ~/.config is the highest-precedence location,
# so this overrides the generic portals.conf in this directory.
#
# Why this is needed: the generic portals.conf sets default=gtk;gnome and
# does NOT list InputCapture, so xdg-desktop-portal routes InputCapture to
# the gnome backend -- which only works under Mutter and otherwise fails
# with "No such interface org.freedesktop.impl.portal.InputCapture",
# breaking deskflow's software-KVM input capture under gowl.  Pin
# InputCapture + RemoteDesktop to the gowl backend
# (xdg-desktop-portal-gowl); ScreenCast/Screenshot stay on wlr (which
# implements them); everything else falls through to gtk;gnome.
[preferred]
default=gtk;gnome
org.freedesktop.impl.portal.InputCapture=gowl
org.freedesktop.impl.portal.RemoteDesktop=gowl
org.freedesktop.impl.portal.ScreenCast=wlr
org.freedesktop.impl.portal.Screenshot=wlr
